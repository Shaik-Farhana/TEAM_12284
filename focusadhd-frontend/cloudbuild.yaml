steps:
- name: 'gcr.io/cloud-builders/docker'
  args: [
    'build', 
    '--tag', '$_TAG', 
    '--build-arg', 'VITE_API_BASE_URL=$_VITE_API_BASE_URL', 
    '--build-arg', 'VITE_SUPABASE_URL=$_VITE_SUPABASE_URL', 
    '--build-arg', 'VITE_SUPABASE_ANON_KEY=$_VITE_SUPABASE_ANON_KEY', 
    '.'
  ]

- name: 'gcr.io/cloud-builders/docker'
  args: ['push', '$_TAG']

- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args: [
    'run', 'deploy', 'focusadhd-frontend',
    '--image', '$_TAG',
    '--region', 'us-central1',
    '--platform', 'managed',
    '--allow-unauthenticated'
  ]

images: ['$_TAG']

substitutions:
  _TAG: 'us-central1-docker.pkg.dev/stable-hydra-492506-d4/focusadhd/frontend:latest'
  _VITE_API_BASE_URL: ''
  _VITE_SUPABASE_URL: ''
  _VITE_SUPABASE_ANON_KEY: ''
